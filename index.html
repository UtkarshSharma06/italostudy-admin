  <!-- Preload Critical Assets (Local paths for maximum reliability) -->
  <link rel="preload" href="/logo.webp" as="image" type="image/webp" fetchpriority="high">
  <link rel="preload" href="/images/hero/banner-img.webp" as="image" type="image/webp" fetchpriority="high">

  <!-- Outfit — Primary Brand Font (Consolidated) -->

  <!-- Google Search Console Verification -->
  <meta name="google-site-verification" content="uQqeVzzdOhR0Nb7s2EjgPEWhCBkUH-WYsDE5os5XgjI" />

  <!-- Google AdSense — deferred to prioritize LCP/FID -->
  <script>
    // Load AdSense only well after initial paint to prevent CPU bottleneck
    window.addEventListener('load', function () {
      setTimeout(function () {
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7472926437419938';
        s.crossOrigin = 'anonymous';
        document.head.appendChild(s);
      }, 5000); // 5 sec delay — critical rendering first
    });
  </script>
  <meta name="google-adsense-account" content="ca-pub-7472926437419938">

  <!-- Website Title and Branding (Fallback) -->

  <!-- Favicons and Brand Identity -->
  <link rel="icon" href="/favicon.ico?v=2" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=2" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png?v=2" />
  <link rel="apple-touch-icon" href="/favicon.png?v=2" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    html {
      scroll-behavior: smooth;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: #fff;
      color: #050e38;
    }

    #root {
      min-height: 100vh
    }

    /* Critical Hero Styles — Inlined for FCP/LCP */
    .hero-two-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 2rem 1rem;
      min-height: 80vh;
    }

    @media (min-width: 1024px) {
      .hero-two-col {
        flex-direction: row;
        justify-content: space-between;
        text-align: left;
        padding: 4rem 3rem;
      }
    }

    .hero-heading {
      font-size: clamp(36px, 6vw, 70px);
      font-weight: 900;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    .hero-text {
      color: #6b7280;
      font-size: 1.1rem;
      line-height: 1.6;
      max-width: 500px;
    }

    .hero-banner-img {
      max-width: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      object-fit: contain;
    }

    /* ── Inline Pre-JS Skeleton ─────────────────────────────────────────── */
    @keyframes _sk {
      0%   { background-position: -800px 0 }
      100% { background-position:  800px 0 }
    }
    .sk-bar {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 1600px 100%;
      animation: _sk 1.8s infinite linear;
      border-radius: 6px;
    }
    #app-sk {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #ffffff;
      display: flex;
      flex-direction: column;
      pointer-events: none;
    }
    #app-sk.sk-out {
      opacity: 0;
      transition: opacity 0.18s ease;
    }
  </style>

  <!-- Dynamic meta tags will be injected here by react-helmet-async -->

  <!-- SEO Schema for Brand Recognition -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "ItaloStudy",
      "alternateName": ["italostudy", "italo study"],
      "url": "https://italostudy.com",
      "logo": "https://italostudy.com/logo.webp",
      "description": "Administrative Control Panel for Italostudy.",
      "sameAs": [
        "https://www.instagram.com/italostudycom",
        "https://chat.whatsapp.com/CfVh7u9L6vT7ZFpZwwVa4A"
      ]
    }
  </script>
</head>

<body>

  <!-- ── Inline Pre-JS Skeleton ──────────────────────────────────────────
       Renders instantly (< 50ms) before any JavaScript downloads.
       Removed by main.tsx after React's first paint via requestAnimationFrame.
  ─────────────────────────────────────────────────────────────────────── -->
  <div id="app-sk" aria-hidden="true">
    <!-- Navbar -->
    <div style="height:60px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;padding:0 clamp(1rem,4vw,3rem);gap:1.5rem;">
      <div class="sk-bar" style="width:clamp(90px,12vw,130px);height:26px;border-radius:8px;background:linear-gradient(90deg,#e0e7ff 25%,#c7d2fe 50%,#e0e7ff 75%);background-size:1600px 100%;"></div>
      <div class="sk-bar" style="width:52px;height:13px;display:none;" id="sk-n1"></div>
      <div class="sk-bar" style="width:52px;height:13px;display:none;" id="sk-n2"></div>
      <div class="sk-bar" style="width:52px;height:13px;display:none;" id="sk-n3"></div>
      <div style="flex:1"></div>
      <div class="sk-bar" style="width:76px;height:36px;border-radius:20px;"></div>
    </div>
    <!-- Announcement strip -->
    <div class="sk-bar" style="height:36px;border-radius:0;background:linear-gradient(90deg,#eff6ff 25%,#dbeafe 50%,#eff6ff 75%);background-size:1600px 100%;flex-shrink:0;"></div>
    <!-- Hero area -->
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(2rem,6vw,5rem) clamp(1rem,5vw,3rem);gap:1.25rem;max-width:820px;margin:0 auto;width:100%;">
      <div class="sk-bar" style="width:min(220px,55%);height:13px;"></div>
      <div class="sk-bar" style="width:100%;height:clamp(40px,8vw,68px);"></div>
      <div class="sk-bar" style="width:88%;height:clamp(36px,7vw,60px);"></div>
      <div class="sk-bar" style="width:72%;height:clamp(30px,6vw,52px);"></div>
      <div class="sk-bar" style="width:60%;height:18px;margin-top:0.5rem;"></div>
      <div class="sk-bar" style="width:50%;height:16px;"></div>
      <div style="display:flex;gap:0.875rem;margin-top:1.25rem;flex-wrap:wrap;justify-content:center;">
        <div class="sk-bar" style="width:148px;height:48px;border-radius:24px;background:linear-gradient(90deg,#c7d2fe 25%,#a5b4fc 50%,#c7d2fe 75%);background-size:1600px 100%;"></div>
        <div class="sk-bar" style="width:132px;height:48px;border-radius:24px;"></div>
      </div>
    </div>
  </div>
  <script>
    // Show desktop nav items on larger screens
    if (window.innerWidth >= 1024) {
      ['sk-n1','sk-n2','sk-n3'].forEach(function(id){
        var el = document.getElementById(id);
        if(el) el.style.display = 'block';
      });
    }
  </script>

  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>

</body>

</html>
